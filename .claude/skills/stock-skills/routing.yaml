# Stock Skills Routing — Agent 选择 few-shot
# 不需要穷举。保留代表性模式，Codex 可据此灵活判断。
#
# Output & Visibility v1 (KIK-729) 字段:
#   pattern: A | B | C  (未指定时自动判定)
#     A = 极简(1-3 行即可回答的事实查询)
#     B = 标准(单一 Agent)
#     C = 链式(连续 ≥2 或 progressive/routine)
#   header: "🎯 [<agent or chain>] <task>" 形式的 Layer 1 标题
#     省略时自动生成为 `[<agent>] <agent.role>`
#
# History Check (KIK-740) 字段:
#   history_check: true  → 投资判断时并行调用 4 LLM 自动检查历史相似案例
#     详情见 SKILL.md 的 "History Check" 章节
#
# Session-Start hard gate (KIK-741) 字段:
#   pf_state_required: true  → orchestrator 启动 Agent 前必须调用 reconcile_session_state()
#     morning-summary / routine-daily / routine-weekly / 投资判断、PF/cash/holdings 相关模式需要设置
#     即使未设置 flag，SKILL.md 的安全侧关键词判定(早上好/早盘/今天/现状/PF 等)也会触发
#     详情见 SKILL.md 的 "Session Start State Reconcile" 和 "Hook 顺序" 章节

agents:
  screener:
    role: 找股票、执行筛选
    triggers: [找, 筛选, 好股票, 推荐, 低估, 高股息, 主题, 趋势, 成长股, 品质, 高质量, 质量, 持续性, 股东回报, 稳健, 优质, 小盘股, 十倍股, 冷门, 挖掘, 无名, ETF, 债券ETF, 行业ETF]
    required_context:
      - key: region
        optional: true
        default: japan
      - key: theme
        optional: true
  analyst:
    role: 个股和 ETF 分析、估值评估
    triggers: [报告, 分析, 低估程度, 股东回报率, 价值陷阱]
    required_context:
      - key: symbol
        optional: false
  health-checker:
    role: 输出 PF 的事实和数值(不做判断或推荐)
    triggers: [PF, 投资组合, 盈亏, 健康检查, 压力测试, VIX, 利率, 预期回报, 结构, 偏离, 市况检查, 早上好, 早盘摘要, 早盘, 待办, 计划, target, 日常任务, 汇总检查, 日检, 例行检查]
    required_context: []
  researcher:
    role: 新闻、X 情绪、行业/市场动态、商业模式研究
    triggers: [新闻, 研究, 深挖, 行业, 市场, 市况, 情绪, 商业模式, 动态]
    required_context:
      - key: topic_or_symbol
        optional: true
        default: market_overview
  strategist:
    role: 投资判断、调仓建议、工作流设计、卖出判断
    triggers: [调仓, 再平衡, 改善, 调整, 计划, 策略, 怎么办, 换仓, 置换, 卖出, 止损, 止盈, 放手, 撤退, 该卖吗, 卖点]
    required_context:
      - key: target_scope
        optional: true
        default: portfolio
  risk-assessor:
    role: 市场风险状态判定(risk-on/neutral/risk-off)+ PF 平衡目标提示
    triggers: [风险判定, 风险偏好, 避险, 回调买入, 买超, 卖超, 市况判定]
    required_context: []
  quant-researcher:
    role: 量化研究证据、因子评价、TopN 回测、实验查询
    triggers: [量化, 因子, IC, Rank IC, 分组收益, 回测, TopN, 实验, experiment_id, 因子暴露, coverage, artifact]
    required_context:
      - key: quant_task
        optional: true
        default: factor_or_experiment_query
  reviewer:
    role: 质量、矛盾、风险、反方检查(动态 LLM 选择)
    triggers: []  # 自动插入: 输出包含投资判断时
    required_context: []

examples:
  # --- 单一 Agent (Pattern B) ---
  - intent: "有什么好股票？"
    agent: screener
    pattern: B
    header: "🎯 [screener] 股票筛选"

  - intent: "帮我找美国高股息股"
    agent: screener
    pattern: B
    header: "🎯 [screener] 美国高股息筛选"

  - intent: "AI 相关的低估股票"
    agent: screener
    pattern: B
    header: "🎯 [screener] AI 相关低估筛选"

  # --- 成长仓位筛选(联动风险判定 / Pattern C) ---
  # risk-on → 跟随趋势，risk-off → 低估/逆向，neutral → 暂缓
  - intent: "帮我找成长股"
    agents: [risk-assessor, screener]
    pattern: C
    header: "🎯 [risk-assessor → screener] 风险判定 → 股票筛选"
    note: "将 risk-assessor 的判定结果传给 screener。normal→mode=momentum+sector_signal，risk-off→暂缓筛选(不买)"

  - intent: "丰田怎么样？"
    agent: analyst
    pattern: B
    header: "🎯 [analyst] 丰田(7203.T) 分析"

  - intent: "PF 还好吗？"
    agent: health-checker
    pattern: B
    header: "🎯 [health-checker] PF 健康检查"
    pf_state_required: true

  - intent: "做个压力测试"
    agent: health-checker
    pattern: B
    header: "🎯 [health-checker] 压力测试"
    pf_state_required: true

  - intent: "做压力测试"
    agent: health-checker
    pattern: B
    header: "🎯 [health-checker] 压力测试"
    pf_state_required: true

  # --- Pattern A: 极简(1-3 行即可回答的事实查询) ---
  - intent: "VIX 是多少？"
    agent: health-checker
    pattern: A
    header: "🎯 [health-checker] VIX 确认"

  - intent: "看一下待办"
    agent: health-checker
    pattern: A
    header: "🎯 [health-checker] 待办列表"

  - intent: "确认一下计划"
    agent: health-checker
    pattern: A
    header: "🎯 [health-checker] 计划确认"

  # --- 日常任务: 日检 (KIK-724 / Pattern C) ---
  - intent: "日常任务"
    mode: routine-daily
    agents: [health-checker, researcher]
    pattern: C
    header: "🎯 [routine-daily] 日检"
    pf_state_required: true
    note: "detect_alerts→HC(PF)→HC(市况)+researcher 并行→目标偏离+WL 警报。3-4 分钟"

  - intent: "汇总检查"
    mode: routine-daily
    agents: [health-checker, researcher]
    pattern: C
    header: "🎯 [routine-daily] 日检汇总"
    pf_state_required: true

  - intent: "日检"
    mode: routine-daily
    agents: [health-checker, researcher]
    pattern: C
    header: "🎯 [routine-daily] 日检"
    pf_state_required: true

  - intent: "例行检查"
    mode: routine-daily
    agents: [health-checker, researcher]
    pattern: C
    header: "🎯 [routine-daily] 例行检查执行"
    pf_state_required: true

  - intent: "早上好"
    mode: morning-summary
    agent: health-checker
    pattern: A
    header: "🎯 [morning-summary] 早盘摘要"
    pf_state_required: true

  - intent: "早盘摘要"
    mode: morning-summary
    agent: health-checker
    pattern: A
    header: "🎯 [morning-summary] 早盘摘要"
    pf_state_required: true

  - intent: "今天的情况"
    mode: morning-summary
    agent: health-checker
    pattern: A
    header: "🎯 [morning-summary] 今天的情况"
    pf_state_required: true

  - intent: "今天的状况"
    mode: morning-summary
    agent: health-checker
    pattern: A
    header: "🎯 [morning-summary] 今天的状况"
    pf_state_required: true

  - intent: "现状怎么样？"
    mode: morning-summary
    agent: health-checker
    pattern: A
    header: "🎯 [morning-summary] 现状确认"
    pf_state_required: true

  - intent: "现状如何？"
    mode: morning-summary
    agent: health-checker
    pattern: A
    header: "🎯 [morning-summary] 现状确认"
    pf_state_required: true

  # --- 日常任务: 周度 (KIK-724 / Pattern C + 自动 Reviewer) ---
  - intent: "完整检查"
    mode: routine-weekly
    agents: [health-checker, researcher, risk-assessor, strategist, screener, reviewer]
    pattern: C
    header: "🎯 [routine-weekly] 周度完整检查"
    review: true
    pf_state_required: true
    note: "日检+risk-assessor→strategist→条件式 screener→reviewer。8-13 分钟"

  - intent: "周度复盘"
    mode: routine-weekly
    agents: [health-checker, researcher, risk-assessor, strategist, screener, reviewer]
    pattern: C
    header: "🎯 [routine-weekly] 周度复盘"
    review: true
    pf_state_required: true

  - intent: "想认真看一遍"
    mode: routine-weekly
    agents: [health-checker, researcher, risk-assessor, strategist, screener, reviewer]
    pattern: C
    header: "🎯 [routine-weekly] 周度复盘"
    review: true
    pf_state_required: true

  - intent: "告诉我最新新闻"
    agent: researcher
    pattern: B
    header: "🎯 [researcher] 最新新闻"

  - intent: "研究一下半导体行业"
    agent: researcher
    pattern: B
    header: "🎯 [researcher] 半导体行业研究"

  - intent: "给我调仓建议"
    agent: strategist
    pattern: B
    header: "🎯 [strategist] 调仓建议"
    review: true
    history_check: true
    pf_state_required: true

  - intent: "用计划模式"
    agents: [health-checker, analyst, researcher, strategist]
    pattern: C
    header: "🎯 [HC → analyst → researcher → strategist] PF 确认 → 分析 → 研究 → 策略制定"
    progressive: true
    review: true
    history_check: true
    pf_state_required: true

  # --- 多 Agent 链式执行 (Pattern C) ---
  - intent: "现在热门主题是什么？"
    agents: [researcher, screener]
    pattern: C
    header: "🎯 [researcher → screener] 主题研究 → 股票筛选"

  - intent: "做一下风险判定"
    agent: risk-assessor
    pattern: B
    header: "🎯 [risk-assessor] 风险判定"

  - intent: "现在是 risk-on 吗？"
    agent: risk-assessor
    pattern: A
    header: "🎯 [risk-assessor] 风险状态确认"

  - intent: "判断能不能回调买入"
    agent: risk-assessor
    pattern: B
    header: "🎯 [risk-assessor] 回调买入判定"

  - intent: "市况检查"
    agents: [health-checker, researcher]
    pattern: C
    header: "🎯 [HC + researcher] 市况定量 + 新闻"

  - intent: "想改善 PF"
    agents: [health-checker, strategist]
    pattern: C
    header: "🎯 [HC → strategist] PF 数值确认 → 改善建议"
    review: true
    history_check: true
    pf_state_required: true

  # --- 卖出判断(risk-assessor → health-checker → strategist 三段链) ---
  - intent: "这只股票该卖吗？"
    agents: [risk-assessor, health-checker, strategist]
    pattern: C
    header: "🎯 [risk → HC → strategist] 风险判定 → 数值确认 → 卖出判断"
    progressive: true
    review: true
    history_check: true
    pf_state_required: true
    note: "risk-assessor 做市场风险判定→health-checker 给出数值事实→strategist 核对 check_exit_rule + What-If 比较"

  - intent: "应该止损吗？"
    agents: [risk-assessor, health-checker, strategist]
    pattern: C
    header: "🎯 [risk → HC → strategist] 风险判定 → 数值确认 → 止损判断"
    progressive: true
    review: true
    history_check: true
    pf_state_required: true

  - intent: "应该止盈吗？"
    agents: [risk-assessor, health-checker, strategist]
    pattern: C
    header: "🎯 [risk → HC → strategist] 风险判定 → 数值确认 → 止盈判断"
    progressive: true
    review: true
    history_check: true
    pf_state_required: true

  - intent: "确认风险后找替代标的"
    agents: [health-checker, screener]
    pattern: C
    header: "🎯 [HC → screener] 风险确认 → 替代候选探索"
    review: true
    history_check: true
    pf_state_required: true

  - intent: "研究半导体并找有前景的股票"
    agents: [researcher, screener]
    pattern: C
    header: "🎯 [researcher → screener] 行业研究 → 股票探索"

  - intent: "研究丰田并记录笔记"
    agent: analyst
    pattern: B
    header: "🎯 [analyst] 丰田研究+笔记"

  # --- Quant Research Extension / Agent 集成 (Phase 6) ---
  - intent: "评价 momentum_12_1 因子的 IC 和分组收益"
    agent: quant-researcher
    pattern: B
    header: "🎯 [quant-researcher] 因子评价"
    note: "纯量化问题。输出 experiment_id/artifact/coverage，禁止买卖建议"

  - intent: "用 composite_v1 做 TopN 回测"
    agent: quant-researcher
    pattern: B
    header: "🎯 [quant-researcher] TopN 回测"
    note: "纯量化回测。关键指标必须来自 metrics.json"

  - intent: "最近的量化实验有哪些？"
    agent: quant-researcher
    pattern: A
    header: "🎯 [quant-researcher] 实验查询"

  - intent: "用美股 sample 测试 momentum 因子"
    agent: quant-researcher
    pattern: B
    header: "🎯 [quant-researcher] 美股 fixture 因子评价"
    note: "Phase 7a 三市场 fixture。必须输出 mode=fixture, market=us 和 provider status"

  - intent: "下载 A 股数据并检查质量"
    agent: quant-researcher
    pattern: B
    header: "🎯 [quant-researcher] 量化数据更新检查"
    note: "调用 quant_data.update/check；provider fallback 时输出 degraded mode 和 skip_reason"

  - intent: "用量化结果帮我设计再平衡策略"
    agents: [quant-researcher, strategist]
    pattern: C
    header: "🎯 [quant-researcher → strategist] 量化证据 → 策略综合"
    review: true
    history_check: true
    pf_state_required: true
    note: "Quant Researcher 只输出证据；Strategist 负责最终策略判断"

  - intent: "分析丰田并看因子暴露"
    agents: [analyst, quant-researcher]
    pattern: C
    header: "🎯 [analyst → quant-researcher] 个股分析 → 因子暴露"
    note: "Analyst 做估值/基本面；Quant Researcher 提供因子暴露证据"

  - intent: "只有 5 只股票也给我看因子结论"
    agent: quant-researcher
    pattern: B
    header: "🎯 [quant-researcher] 样本充足性检查"
    note: "样本不足时必须拒绝给出 IC/分组收益等结论"

  # --- 记录类(无需 Agent，由 orchestrator 直接执行 / Pattern A) ---
  - intent: "记一下"
    action: direct
    operation: note_save
    pattern: A
    header: "🎯 [direct] 保存笔记"

  - intent: "记录经验教训"
    action: direct
    operation: note_save
    pattern: A
    header: "🎯 [direct] 经验教训记录"

  - intent: "记录投资逻辑"
    action: direct
    operation: note_save
    pattern: A
    header: "🎯 [direct] 投资逻辑记录"

  - intent: "加入观察列表"
    action: direct
    operation: watchlist_add
    pattern: A
    header: "🎯 [direct] 添加观察列表"

  - intent: "查看观察列表"
    action: direct
    operation: watchlist_list
    pattern: A
    header: "🎯 [direct] 显示观察列表"

  - intent: "从观察列表移除"
    action: direct
    operation: watchlist_remove
    pattern: A
    header: "🎯 [direct] 删除观察列表"

  - intent: "买了 100 股丰田"
    action: direct
    operation: portfolio_buy
    pattern: A
    header: "🎯 [direct] PF 买入记录"

  - intent: "卖了 5 股 AAPL"
    action: direct
    operation: portfolio_sell
    pattern: A
    header: "🎯 [direct] PF 卖出记录"

  - intent: "笔记列表"
    action: direct
    operation: note_list
    pattern: A
    header: "🎯 [direct] 笔记列表"

  - intent: "删除笔记"
    action: direct
    operation: note_delete
    pattern: A
    header: "🎯 [direct] 删除笔记"

  - intent: "现金是○○日元"
    action: direct
    operation: cash_update
    pattern: A
    header: "🎯 [direct] 更新现金余额"

  - intent: "现金余额"
    action: direct
    operation: cash_update
    pattern: A
    header: "🎯 [direct] 显示现金余额"

  - intent: "美元是 $○○"
    action: direct
    operation: cash_update
    pattern: A
    header: "🎯 [direct] 更新 USD 余额"

  - intent: "同步一下"
    action: direct
    operation: data_sync
    pattern: A
    header: "🎯 [direct] GraphRAG 同步"

  - intent: "同步数据"
    action: direct
    operation: data_sync
    pattern: A
    header: "🎯 [direct] 数据同步"

  - intent: "和 GraphRAG 同步"
    action: direct
    operation: data_sync
    pattern: A
    header: "🎯 [direct] GraphRAG 同步"

  - intent: "检查数据一致性"
    action: direct
    operation: data_sync
    pattern: A
    header: "🎯 [direct] 一致性检查"

context_rules:
  - 用户省略刚才提到的股票时自动补全
  - 刚才筛选结果中的“第 N 名股票”要自动解析
  - 刚才 health 结果中的注意标的(RSI 异常值、大幅亏损等)要自动继承

ambiguity:
  strategy: ask  # 多个 Agent 同分时，简短提示选项
