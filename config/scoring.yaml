# 3 轴质量评分配置 (KIK-708)
# v3.1 — 4LLM×3 轮 + 5 agent 审查 + 3 LLM 最终批准后确定

weights:
  return:
    yield: 0.35          # 股息收益率
    coverage: 0.35       # 利润覆盖率（EPS÷DPS）
    consistency: 0.20    # 派息健康度和一致性
    buyback: 0.10        # 回购（当前逻辑由 yield 合并处理）

  growth:
    organic: 0.35        # organic growth: max(EG, RG)
    roic: 0.25           # ROIC/ROA proxy
    cashflow: 0.20       # adjusted cash conversion
    runway: 0.15         # sector runway
    capital: 0.05        # capital allocation / buyback

  durability:
    financial: 0.30      # 财务稳健度 / interest coverage
    earnings: 0.30       # 利润率和稳定性
    model: 0.20          # 商业模式韧性
    liquidity: 0.20      # 流动性

  total:
    durability: 0.45     # 先活下来最重要
    growth: 0.35         # 复利来源
    return: 0.20         # 股东回报

# Preset 联动总权重 override (KIK-725)
# score_quality(preset_weight=...) 动态切换
# 全 preset 保持 durability >= 0.30，作为避雷 guardrail
preset_overrides:
  income:
    return: 0.45
    durability: 0.40
    growth: 0.15
  dividend:
    return: 0.45
    durability: 0.40
    growth: 0.15
  growth:
    growth: 0.50
    durability: 0.35
    return: 0.15
  defensive:
    durability: 0.55
    return: 0.30
    growth: 0.15

thresholds:
  # D/E penalty（分档严格化）
  de_penalty:
    level1: 100
    level2: 200
    hard_cap: 250

  # 股息收益率低于该值时，仅用 A 项直接评分，B/C 视为 0
  zero_div_yield: 1.0

  # 成长性和 coverage 上限
  organic_growth_cap: 30
  roic_cap: 30
  coverage_cap: 3.0

  # durability 低时限制 return score
  cap_rules:
    - durability_below: 3
      return_max: 4
    - durability_below: 5
      return_max: 6

growth_runway:
  fallback: 4
  sector_defaults:
    Technology: 8
    Healthcare: 7
    Consumer Cyclical: 6
    Communication Services: 6
    Industrials: 5
    Consumer Defensive: 4
    Financial Services: 4
    Energy: 3
    Utilities: 2
    Real Estate: 2
    Basic Materials: 3

stability_beta:
  low_beta_coeff: 0.05
  low_beta_floor: 0.90
  high_beta_coeff: 0.20
  high_beta_floor: 0.75

industry_divisors:
  Computer Hardware: 3
  Electronic Components: 3
  Semiconductors: 4
  Software—Infrastructure: 6
  Software—Application: 6

quadrants:
  sell:
    label: "卖出考虑"
    durability_below: 3
  watch:
    label: "需监控"
    durability_below: 5
    total_below: 5
  add:
    label: "加仓"
    total_min: 7
    all_axes_min: 4
  hold:
    label: "继续持有"
